<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoodJournal – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  
  <div class="center">
    <div class="card">

      
      <div class="brand">
        <span>🌿</span>
        <span>MoodJournal</span>
      </div>

      <!-- login form html -->
      <div id="loginForm">
        <h2>Sign In</h2>
        <p class="subtitle">Welcome back — let's check in.</p>

        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>

        <a href="#" class="forgot">Forgot password?</a>

        <p class="error-msg" id="errorMsg"></p>

        <button class="btn" onclick="LoginHandler()">Sign In</button>

        <div class="divider"></div>

        <button class="btn-ghost" onclick="showSignup()">Don't have an account? Sign up</button>
      </div>

      <!-- this the signup form but has to be hidden by default to follow normal website architecture -->
      <div id="signupForm" class="hidden">
        <h2>Create Account</h2>
        <p class="subtitle">Start your journaling journey.</p>

        <div class="input-group">
          <label for="newName">Full Name</label>
          <input type="text" id="newName" placeholder="Your name" />
        </div>

        <div class="input-group">
          <label for="newEmail">Email</label>
          <input type="email" id="newEmail" placeholder="you@example.com" />
        </div>

        <div class="input-group">
          <label for="newPassword">Password</label>
          <input type="password" id="newPassword" placeholder="Min. 6 characters" />
        </div>

        <p class="error-msg" id="signupErrorMsg"></p>

        <button class="btn" onclick="SignupHandler()">Create Account</button>

        <div class="divider"></div>

        <button class="btn-ghost" onclick="showLogin()">Already have an account? Sign in</button>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
